<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" fill="none">
  <rect width="640" height="400" fill="#020000"/>
  <defs>
    <linearGradient id="dg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff1a1a;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ff6600;stop-opacity:0.0"/>
    </linearGradient>
  </defs>
  
  <!-- HUD background grid -->
  <line x1="0" y1="100" x2="640" y2="100" stroke="#ff1a1a" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="200" x2="640" y2="200" stroke="#ff1a1a" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="300" x2="640" y2="300" stroke="#ff1a1a" stroke-width="0.5" opacity="0.2"/>
  <line x1="213" y1="0" x2="213" y2="400" stroke="#ff1a1a" stroke-width="0.5" opacity="0.2"/>
  <line x1="426" y1="0" x2="426" y2="400" stroke="#ff1a1a" stroke-width="0.5" opacity="0.2"/>

  <!-- Restaurant-like UI mockup -->
  <rect x="40" y="30" width="560" height="340" fill="#050000" stroke="#ff1a1a" stroke-width="1" opacity="0.9"/>
  <!-- Header bar -->
  <rect x="40" y="30" width="560" height="40" fill="#0a0000" stroke-bottom="#ff1a1a"/>
  <rect x="60" y="45" width="60" height="6" fill="#ff1a1a" opacity="0.8"/>
  <circle cx="560" cy="50" r="8" fill="none" stroke="#ff1a1a" stroke-width="1"/>
  
  <!-- Data Blocks -->
  <rect x="60" y="100" width="160" height="80" fill="url(#dg)" stroke="#ff1a1a" stroke-width="0.5"/>
  <rect x="75" y="115" width="40" height="4" fill="#ff1a1a" opacity="0.8"/>
  <rect x="75" y="130" width="100" height="2" fill="#ff1a1a" opacity="0.4"/>
  <rect x="75" y="140" width="80" height="2" fill="#ff1a1a" opacity="0.4"/>
  
  <rect x="240" y="100" width="160" height="80" fill="#080000" stroke="#ff1a1a" stroke-width="0.5"/>
  <rect x="255" y="115" width="40" height="4" fill="#ff1a1a" opacity="0.8"/>
  <rect x="255" y="130" width="100" height="2" fill="#ff1a1a" opacity="0.4"/>
  
  <rect x="420" y="100" width="160" height="80" fill="#080000" stroke="#ff1a1a" stroke-width="0.5"/>
  <rect x="435" y="115" width="40" height="4" fill="#ff1a1a" opacity="0.8"/>
  <rect x="435" y="130" width="100" height="2" fill="#ff1a1a" opacity="0.4"/>
  
  <!-- Linear Chart -->
  <rect x="60" y="210" width="340" height="130" fill="#080000" stroke="#ff1a1a" stroke-width="0.5"/>
  <polyline points="80,310 120,280 160,290 200,240 240,260 280,220 320,230 360,250 380,230" fill="none" stroke="#ff1a1a" stroke-width="2"/>
  
  <!-- Radar Target -->
  <rect x="420" y="210" width="160" height="130" fill="#080000" stroke="#ff1a1a" stroke-width="0.5"/>
  <circle cx="500" cy="275" r="40" fill="none" stroke="#ff1a1a" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>
  <path d="M500 235 A40 40 0 0 1 540 275" fill="none" stroke="#ff1a1a" stroke-width="2"/>
  <line x1="500" y1="265" x2="500" y2="285" stroke="#ff1a1a" stroke-width="1"/>
  <line x1="490" y1="275" x2="510" y2="275" stroke="#ff1a1a" stroke-width="1"/>
  
  <text x="320" y="385" text-anchor="middle" fill="#aa0000" font-family="monospace" font-size="8" letter-spacing="3">SYS.DINEFLOW_INITIALIZED</text>
</svg>
