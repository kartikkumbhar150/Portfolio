<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" fill="none">
  <rect width="640" height="400" fill="#020000"/>
  <defs>
    <radialGradient id="ng" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff1a1a;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
  </defs>
  <rect width="640" height="400" fill="url(#ng)"/>
  
  <!-- Neural network visualization -->
  <line x1="120" y1="100" x2="260" y2="140" stroke="#ff1a1a" stroke-width="0.5" opacity="0.4"/>
  <line x1="120" y1="160" x2="260" y2="140" stroke="#ff1a1a" stroke-width="0.5" opacity="0.4"/>
  <line x1="120" y1="220" x2="260" y2="200" stroke="#ff1a1a" stroke-width="0.5" opacity="0.4"/>
  <line x1="120" y1="280" x2="260" y2="260" stroke="#ff1a1a" stroke-width="0.5" opacity="0.4"/>
  
  <line x1="260" y1="140" x2="400" y2="200" stroke="#ff1a1a" stroke-width="0.5" opacity="0.6"/>
  <line x1="260" y1="200" x2="400" y2="200" stroke="#ff1a1a" stroke-width="0.5" opacity="0.6"/>
  <line x1="260" y1="260" x2="400" y2="200" stroke="#ff1a1a" stroke-width="0.5" opacity="0.6"/>
  
  <line x1="400" y1="200" x2="520" y2="200" stroke="#ff1a1a" stroke-width="2" opacity="0.9"/>
  
  <!-- Nodes as squares for HUD feel -->
  <rect x="110" y="90" width="20" height="20" fill="#050000" stroke="#ff1a1a" stroke-width="1"/>
  <rect x="110" y="150" width="20" height="20" fill="#050000" stroke="#ff1a1a" stroke-width="1"/>
  <rect x="110" y="210" width="20" height="20" fill="#050000" stroke="#ff1a1a" stroke-width="1"/>
  <rect x="110" y="270" width="20" height="20" fill="#050000" stroke="#ff1a1a" stroke-width="1"/>
  
  <rect x="250" y="130" width="20" height="20" fill="#150000" stroke="#ff1a1a" stroke-width="1"/>
  <rect x="250" y="190" width="20" height="20" fill="#150000" stroke="#ff1a1a" stroke-width="1"/>
  <rect x="250" y="250" width="20" height="20" fill="#150000" stroke="#ff1a1a" stroke-width="1"/>
  
  <rect x="390" y="190" width="20" height="20" fill="#ff1a1a" opacity="0.4" stroke="#ff1a1a" stroke-width="1"/>
  
  <!-- Output -->
  <rect x="500" y="180" width="40" height="40" fill="none" stroke="#ff1a1a" stroke-width="2"/>
  <text x="520" y="204" text-anchor="middle" fill="#ff1a1a" font-family="monospace" font-size="10" font-weight="bold">TARGET</text>
  
  <!-- Labels -->
  <text x="120" y="330" text-anchor="middle" fill="#cc0000" font-family="monospace" font-size="10" letter-spacing="2">IN_VECTOR</text>
  <text x="260" y="330" text-anchor="middle" fill="#cc0000" font-family="monospace" font-size="10" letter-spacing="2">HIDDEN_LAYER</text>
  
  <!-- Accuracy badge -->
  <rect x="220" y="30" width="200" height="30" fill="none" stroke="#ff1a1a" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="320" y="50" text-anchor="middle" fill="#ff1a1a" font-family="monospace" font-size="12" letter-spacing="2">CONFIRMATION: 80%</text>
</svg>
